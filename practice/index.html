<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/practice.css" />
</head>
<body>
  <main class="practice-page">
    <header class="practice-header">
      <div>
        <h1>Practice</h1>
        <p>Find the correct note!</p>
      </div>
      <div class="notation-toggle" role="group" aria-label="Answer notation">
        <button id="notation-el" class="notation-toggle-btn is-active" type="button" aria-pressed="true">ΕΛ</button>
        <button id="notation-en" class="notation-toggle-btn" type="button" aria-pressed="false">ENG</button>
      </div>
    </header>
    <section class="staff-card" aria-label="Treble staff practice">
      <div id="notation-root" class="notation-root"></div>
      <div id="answers-row" class="answers-row"></div>
      <div id="feedback-row" class="feedback-row"></div>
      <p id="game-status" class="game-status"></p>
    </section>
  </main>
  <footer class="practice-footer">
    <span class="footer-copy">© <span id="current-year">2026</span> Dionisis Diamantis. Powered by HTML, CSS & JavaScript.</span>
    <div class="footer-links">
      <a class="footer-back" href="/">← Back to home</a>
    </div>
  </footer>
  <script src="../js/vexflow.js"></script>
  <script src="../js/practice.js"></script>
</body>
</html>
